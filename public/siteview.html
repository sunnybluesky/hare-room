    /////////////////// 画像処理
    // 画像BlobをBase64に変換
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function convertToWebP(file, quality = 0.8, doesSave = true) {
      if (doesSave) {
        imageQueue.push(file)

      }

      return new Promise(async (resolve, reject) => {
        // 対応拡張子チェック
        if (!/image\/(png|jpeg|jpg)/.test(file.type)) {
          var msg = "画像形式は PNG/JPEG/JPG のみ対応しています。"
          alert(msg)
          reject(new Error(msg));
          return;
        }

        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = async () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.width;
          canvas.height = img.height;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);

          canvas.toBlob(
            blob => {
              if (!blob) {
                reject(new Error("WebP変換失敗"));
                return;
              }
              resolve(blob);
              URL.revokeObjectURL(url);
            },
            "image/webp",
            quality
          );
        };

        img.onerror = () => reject(new Error("画像読み込み失敗"));

        img.src = url
        console.log(url)
      });
    }
    function imgToFile(img, fileName = "image.png") {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);

        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("Blob生成失敗"));
            return;
          }

          const file = new File([blob], fileName, {
            type: blob.type,
            lastModified: Date.now(),
          });
          resolve(file);
        }, "image/png");
      });
    }

    async function getFileFromImage(imgElement, fileName, mimeType = 'image/png') {
      return new Promise((resolve, reject) => {
        // 1. canvasを作成して描画
        const canvas = document.createElement('canvas');
        canvas.width = imgElement.naturalWidth;
        canvas.height = imgElement.naturalHeight;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgElement, 0, 0);

        // 2. canvasからBlobを作成
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error('Canvas to Blob conversion failed'));
            return;
          }
          // 3. BlobからFileオブジェクトを作成して返す
          const file = new File([blob], fileName, { type: mimeType });
          resolve(file);
        }, mimeType);
      });
    }

    async function inputImgProcess(file, doesSave = false, hasConvertedBase64 = false) {
      let base64URL
      if (hasConvertedBase64) {

        if (typeof file == "string") {

        } else {

      } else {
